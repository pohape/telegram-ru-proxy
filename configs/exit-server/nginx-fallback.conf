# /etc/nginx/sites-available/fallback
# HTTPS-сайт заглушка для domain fronting
# Замените server_name и пути к сертификатам на свои

server {
    listen 127.0.0.1:8080 ssl;
    server_name your-entry-server.example.com;

    ssl_certificate /etc/ssl/entry-server_fullchain.pem;
    ssl_certificate_key /etc/ssl/entry-server_privkey.pem;

    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
